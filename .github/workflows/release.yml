name: Release

on:
  push:
    branches: [main]
    paths:
      - .github/CLAUDE_CODE_VERSION

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.check_tag.outputs.created }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read Claude Code version
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < .github/CLAUDE_CODE_VERSION)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check_tag.outputs.created == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "claude-safe ${{ steps.version.outputs.tag }}"
          body: |
            claude-safe release targeting Claude Code **${{ steps.version.outputs.version }}**.

            ## Docker Image
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ```

            ## Install / Update
            ```bash
            # Download the script
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/claude-safe \
              -o /usr/local/bin/claude-safe && chmod +x /usr/local/bin/claude-safe

            # Or via the install subcommand (if already installed)
            claude-safe install
            ```
          draft: false
          prerelease: false
          generate_release_notes: true

  docker:
    name: Build Docker Image
    needs: release
    if: needs.release.outputs.created == 'true'
    uses: ./.github/workflows/docker.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
