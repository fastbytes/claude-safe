# ~/.config/claude-safe/tmux.conf
# Optimized for: SSH/Mosh → tmux → claude-safe
#
# Key considerations:
#   - Mosh doesn't forward all escape sequences; OSC52 clipboard needs set-clipboard
#   - Remote terminals vary in Unicode support; settings here favor broad compatibility
#   - Remap common ops to accessible shortcuts for remote/touch-capable terminals
#   - Mouse mode aids navigation in terminals that support pointer events
#   - Mosh can desync on large scrollback; keep history reasonable
#   - Session resilience matters when reconnecting (Mosh survives network changes,
#     tmux pane state must be recoverable)

# ─── Core ────────────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"

# Enable OSC52 clipboard passthrough
set -g set-clipboard on
set -sa terminal-features ",*:clipboard"

# Faster escape recognition (Mosh already adds latency)
set -sg escape-time 10

# Reasonable history — too high and Mosh redraws lag
set -g history-limit 20000

# Focus events for vim/neovim inside sandbox
set -g focus-events on

# Renumber windows on close (keeps Alt-N shortcuts predictable)
set -g renumber-windows on

# Start window/pane numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# ─── Mouse ──────────────────────────────────────────────────────────────────

# Enable mouse — useful for click-to-focus and scroll in remote terminals
# Touch-capable terminals translate gestures to mouse events
set -g mouse on

# Don't exit copy mode on mouse drag end (lets you review selection)
# unbind -T copy-mode-vi MouseDragEnd1Pane

# ─── Prefix ─────────────────────────────────────────────────────────────────

# Default C-b works but may be awkward on some keyboards
# C-a is more reachable; uncomment if you prefer:
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Double-tap prefix to send to nested tmux (e.g., inside sandbox)
bind C-b send-prefix

# ─── Pane navigation (Alt+arrow — no prefix needed) ─────────────────────────

# Alt+arrows: switch panes without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Alt+number: switch windows directly (1-indexed to match base-index)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5

# ─── Splits (prefix + intuitive keys) ───────────────────────────────────────

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Resize (prefix + Shift+arrow) ──────────────────────────────────────────

bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 3
bind -r S-Down  resize-pane -D 3

# ─── Copy mode (vi keys) ────────────────────────────────────────────────────

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -sel clip 2>/dev/null || true"

# Rectangle select
bind -T copy-mode-vi r send -X rectangle-toggle

# ─── Session management shortcuts ───────────────────────────────────────────

# prefix + C-c = claude-tmux dashboard (live preview + fuzzy filter across sessions)
bind C-c display-popup -E -w 90% -h 85% "claude-tmux 2>/dev/null || echo 'claude-tmux not installed: cargo install claude-tmux'"

# prefix + S = choose session (filtered to claude-safe sessions)
bind S choose-tree -s -f "#{m:cs-*,#{session_name}}"

# prefix + D = detach (explicit — avoids accidental detach)
bind D detach-client

# prefix + R = force Mosh redraw (sends clear + tmux refresh)
bind R send-keys C-l \; refresh-client

# ─── Status bar ──────────────────────────────────────────────────────────────

set -g status-position bottom
set -g status-interval 10
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]│ "

# Center: window list (shows all panes/windows)
set -g status-justify centre
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W* "
setw -g window-status-separator ""

# Right: host + time
set -g status-right-length 40
set -g status-right "#[fg=#565f89]│ #[fg=#9ece6a]#H #[fg=#565f89]│ #[fg=#bb9af7]%H:%M"

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# ─── Activity ───────────────────────────────────────────────────────────────

# Visual notification when a background pane has output (claude finishes)
setw -g monitor-activity on
set -g visual-activity off        # don't print message, just highlight in status
set -g activity-action other      # highlight non-current windows

# Bell passthrough — reaches remote terminal via Mosh/SSH
set -g bell-action any
set -g visual-bell off

# ─── Terminal workarounds ────────────────────────────────────────────────────

# Some terminals send odd escape sequences on paste or swipe gestures.
# This prevents them from being interpreted as commands.
set -g assume-paste-time 1

# Wider panes for wide displays — Claude Code output is wide
# (only applies if creating new sessions via this conf)
# set -g default-size "200x50"
